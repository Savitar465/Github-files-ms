spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:github_files_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: create-drop
    # Tras crear el esquema con Hibernate, ejecutar data.sql (datos demo).
    defer-datasource-initialization: true
    show-sql: true

  sql:
    init:
      mode: always

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8180/realms/github-files}

server:
  port: ${SERVER_PORT:8081}

app:
  security:
    oauth2:
      enabled: false

logging:
  level:
    root: INFO
    com.githubx.githubfilesms: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
