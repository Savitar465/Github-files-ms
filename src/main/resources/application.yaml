spring:
  application:
    name: Github-files-ms

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:github_files_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: never

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8180/realms/github-files}

server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /api

grpc:
  server:
    port: ${GRPC_PORT:9093}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# Opcional: URL absoluta para el servidor "Local" en Swagger (vacío = URL relativa al context-path).
# openapi:
#   server-local-url: http://localhost:18080/api

logging:
  level:
    root: INFO
    com.githubx.githubfilesms: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Desactivar OAuth2 solo para entornos controlados (p. ej. smoke test en K8s local sin IdP).
app:
  security:
    oauth2:
      enabled: ${APP_SECURITY_OAUTH2_ENABLED:true}
