apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-github-files-ms-pvc
  labels:
    app: postgres-github-files-ms
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-github-files-ms
  labels:
    app: postgres-github-files-ms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-github-files-ms
  template:
    metadata:
      labels:
        app: postgres-github-files-ms
    spec:
      containers:
        - name: postgres
          image: postgres:14
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: github_files_db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: github-files-ms-secret
                  key: DB_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: github-files-ms-secret
                  key: DB_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-github-files-ms-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app: postgres-github-files-ms
spec:
  type: ClusterIP
  selector:
    app: postgres-github-files-ms
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
